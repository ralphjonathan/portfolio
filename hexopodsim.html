<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexapod Leg Mechanism Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a24;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(30, 30, 40, 0.9);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-group label {
            width: 120px;
            font-weight: bold;
            font-size: 14px;
        }

        input[type=range] {
            width: 150px;
        }

        .val-display {
            background: #2a2a35;
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #444;
            width: 30px;
            text-align: center;
            font-family: monospace;
        }

        #hud {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 30px;
            background: rgba(20, 20, 30, 0.7);
            padding: 15px;
            border-radius: 8px;
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .hud-value {
            font-size: 18px;
            font-family: monospace;
            font-weight: bold;
        }

        #title {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 20px;
            font-weight: bold;
        }

        button {
            background: #4a4a5a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #5a5a6a;
        }
    </style>
</head>

<body>

    <div id="title">Hexapod Leg Mechanism</div>

    <div id="hud">
        <div class="hud-item">
            <span class="hud-label">Foot X</span>
            <span class="hud-value" id="val-x">0.00 cm</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Foot Y</span>
            <span class="hud-value" id="val-y">0.00 cm</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Foot Z (Height)</span>
            <span class="hud-value" id="val-z">0.00 cm</span>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="control-group">
            <label>Coxa (Yaw)</label>
            <input type="range" id="slider-coxa" min="0" max="180" value="90">
            <span class="val-display" id="val-coxa">90</span>
        </div>
        <div class="control-group">
            <label>Femur (Lift)</label>
            <input type="range" id="slider-femur" min="0" max="180" value="90">
            <span class="val-display" id="val-femur">90</span>
        </div>
        <div class="control-group">
            <label>Tibia (Retract)</label>
            <input type="range" id="slider-tibia" min="0" max="180" value="90">
            <span class="val-display" id="val-tibia">90</span>
        </div>
        <button onclick="resetPosition()">Reset Position</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- 1. Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a24);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 20, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.update();

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Grid Floor
        const gridHelper = new THREE.GridHelper(50, 50, 0x444455, 0x333344);
        scene.add(gridHelper);

        // --- 2. Robot Geometry Materials ---
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x3a3a45 });
        const servoMat = new THREE.MeshPhongMaterial({ color: 0x88bbff });
        const linkMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
        const footMat = new THREE.MeshPhongMaterial({ color: 0x5599ff });

        // --- 3. Build Kinematic Chain ---

        // Base Body (Simplified Hexapod Chassis part)
        const bodyGeom = new THREE.BoxGeometry(4, 1, 6);
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.position.y = 10; // Raise body above ground
        scene.add(body);

        // 1. Coxa Joint (Yaw - Z axis rotation in Three.js terms if pointing outward)
        const coxaGroup = new THREE.Group();
        body.add(coxaGroup);
        coxaGroup.position.set(2.5, 0, 0); // Offset from center of body

        const coxaServo = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), servoMat);
        coxaGroup.add(coxaServo);

        const coxaLink = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 2), linkMat);
        coxaLink.rotation.z = Math.PI / 2;
        coxaLink.position.x = 1;
        coxaGroup.add(coxaLink);

        // 2. Femur Joint (Lift - X axis rotation)
        const femurGroup = new THREE.Group();
        coxaGroup.add(femurGroup);
        femurGroup.position.x = 2; // End of Coxa Link

        const femurServo = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), servoMat);
        femurGroup.add(femurServo);

        const femurLink = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 6), linkMat);
        femurLink.rotation.z = Math.PI / 2;
        femurLink.position.x = 3;
        femurGroup.add(femurLink);

        // 3. Tibia Joint (Retract/Extend - X axis rotation)
        const tibiaGroup = new THREE.Group();
        femurGroup.add(tibiaGroup);
        tibiaGroup.position.x = 6; // End of Femur Link

        const tibiaServo = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), servoMat);
        tibiaGroup.add(tibiaServo);

        const tibiaLink = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 8), linkMat);
        tibiaLink.rotation.z = Math.PI / 2;
        tibiaLink.position.x = 4;
        tibiaGroup.add(tibiaLink);

        // Foot
        const foot = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), footMat);
        tibiaGroup.add(foot);
        foot.position.x = 8; // End of Tibia

        // --- 4. Logic & UI Sync ---
        const sliders = {
            coxa: document.getElementById('slider-coxa'),
            femur: document.getElementById('slider-femur'),
            tibia: document.getElementById('slider-tibia')
        };
        const displays = {
            coxa: document.getElementById('val-coxa'),
            femur: document.getElementById('val-femur'),
            tibia: document.getElementById('val-tibia')
        };
        const hud = {
            x: document.getElementById('val-x'),
            y: document.getElementById('val-y'),
            z: document.getElementById('val-z')
        };

        // Degrees to Radians helper
        const deg2rad = (deg) => (deg - 90) * (Math.PI / 180);

        function updateKinematics() {
            // Get slider values (0 to 180, centered at 90)
            const cVal = parseInt(sliders.coxa.value);
            const fVal = parseInt(sliders.femur.value);
            const tVal = parseInt(sliders.tibia.value);

            // Update UI text
            displays.coxa.innerText = cVal;
            displays.femur.innerText = fVal;
            displays.tibia.innerText = tVal;

            // Apply Rotations (Mapping 90 deg to 0 radians straight out)
            coxaGroup.rotation.y = -(cVal - 90) * (Math.PI / 180);
            femurGroup.rotation.z = (fVal - 90) * (Math.PI / 180);
            tibiaGroup.rotation.z = (tVal - 90) * (Math.PI / 180);

            // Calculate global foot position
            const footPos = new THREE.Vector3();
            foot.getWorldPosition(footPos);

            // Update HUD (Rounding to 2 decimals)
            hud.x.innerText = footPos.x.toFixed(2) + " cm";
            hud.y.innerText = footPos.z.toFixed(2) + " cm"; // Z in 3D is usually Depth/Y on ground
            hud.z.innerText = footPos.y.toFixed(2) + " cm"; // Y in 3D is Up/Down
        }

        // Attach event listeners to sliders
        Object.values(sliders).forEach(slider => {
            slider.addEventListener('input', updateKinematics);
        });

        // Global Reset Function for the button
        window.resetPosition = function () {
            sliders.coxa.value = 90;
            sliders.femur.value = 90;
            sliders.tibia.value = 90;
            updateKinematics();
        }

        // Initial setup
        updateKinematics();

        // --- 5. Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Handle Window Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
